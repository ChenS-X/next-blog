name: Sync Blog to RAG

on:
  push:
    paths:
      - 'public/posts_8f2a4c/**'   # 你的文章路径
    branches: [ master ]              # 你的博客仓库主分支

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call RAG sync endpoint
        run: |
          curl -X POST https://blog-rag.csx.life/sync \
            -H "Authorization: Bearer ${{ secrets.SYNC_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{}'